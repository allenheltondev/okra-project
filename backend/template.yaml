AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Okra Project backend + static hosting (Node.js 24, SAM + esbuild)

Parameters:
  SharedUserPoolId:
    Type: String
    Default: ''
    Description: Optional existing Cognito User Pool ID (from Good Roots Network)
  SharedUserPoolClientId:
    Type: String
    Default: ''
    Description: Optional existing Cognito User Pool App Client ID
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string (e.g., from Neon)

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 1024
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        SHARED_USER_POOL_ID: !Ref SharedUserPoolId
        SHARED_USER_POOL_CLIENT_ID: !Ref SharedUserPoolClientId
        DATABASE_URL: !Ref DatabaseUrl
        MEDIA_BUCKET_NAME: !Ref MediaBucket
        PHOTO_PROCESSING_QUEUE_URL: !Ref PhotoProcessingQueue
        PHOTO_RATE_LIMIT_MAX_REQUESTS: '20'
        PHOTO_RATE_LIMIT_WINDOW_SECONDS: '3600'
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - 'pg'

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: api

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - PUT
              - POST
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            AllowedHeaders:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref FrontendOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub '${FrontendBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt MediaBucket.Arn
              - !Sub '${MediaBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  PhotoProcessingDlq:
    Type: AWS::SQS::Queue

  PhotoProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PhotoProcessingDlq.Arn
        maxReceiveCount: 3

  PhotoProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PhotoProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 'sqs:*'
            Resource: !GetAtt PhotoProcessingQueue.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  PhotoProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/handlers/photo-processor.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/photo-processor.handler
      Timeout: 60
      MemorySize: 1024
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                - !Sub '${MediaBucket.Arn}/*'
      Events:
        PhotoQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt PhotoProcessingQueue.Arn
            BatchSize: 5

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/handlers/api.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/api.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
                - sqs:SendMessageBatch
              Resource: !GetAtt PhotoProcessingQueue.Arn
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: ANY

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
  FrontendBucketName:
    Description: S3 bucket that stores frontend static assets
    Value: !Ref FrontendBucket
  FrontendDistributionId:
    Description: CloudFront distribution ID for the frontend
    Value: !Ref FrontendDistribution
  FrontendDistributionDomainName:
    Description: CloudFront domain for frontend access
    Value: !GetAtt FrontendDistribution.DomainName
  MediaBucketName:
    Description: S3 bucket for uploaded/processed images
    Value: !Ref MediaBucket
  PhotoProcessingQueueUrl:
    Description: Queue URL for claimed-photo processing jobs
    Value: !Ref PhotoProcessingQueue
  SharedUserPoolIdInUse:
    Description: Passed-through shared User Pool ID
    Value: !Ref SharedUserPoolId
  SharedUserPoolClientIdInUse:
    Description: Passed-through shared User Pool Client ID
    Value: !Ref SharedUserPoolClientId
