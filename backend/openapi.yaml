openapi: 3.0.3
info:
  title: Okra Project API
  version: 0.1.0
  description: API contract for Okra Project backend.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      tags:
        - system
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: okra-project-api
                  runtime:
                    type: string

  /version:
    get:
      operationId: getVersion
      summary: API version endpoint
      tags:
        - system
      responses:
        '200':
          description: Service version response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - version
                properties:
                  ok:
                    type: boolean
                    example: true
                  version:
                    type: string
                    example: 0.1.0


  /photos:
    post:
      operationId: createPhotoUploadIntent
      summary: Create temporary photo record and pre-signed upload URL
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contentType
              properties:
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                fileName:
                  type: string
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  photoId:
                    type: string
                  uploadUrl:
                    type: string
                  method:
                    type: string
                    example: PUT
                  headers:
                    type: object
                  bucket:
                    type: string
                  s3Key:
                    type: string
                  expiresInSeconds:
                    type: number
        '422':
          description: Validation error
        '429':
          description: Rate limit exceeded

  /submissions:
    post:
      operationId: createSubmission
      summary: Create a pending submission for review and claim uploaded photos
      tags:
        - submissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rawLocationText
                - displayLat
                - displayLng
                - photoIds
              properties:
                contributorName:
                  type: string
                contributorEmail:
                  type: string
                storyText:
                  type: string
                rawLocationText:
                  type: string
                privacyMode:
                  type: string
                  enum: [exact, nearby, neighborhood, city]
                displayLat:
                  type: number
                displayLng:
                  type: number
                photoIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                type: object
                required:
                  - submissionId
                  - status
                properties:
                  submissionId:
                    type: string
                  status:
                    type: string
                    example: pending_review
                  createdAt:
                    type: string
        '422':
          description: Validation error

