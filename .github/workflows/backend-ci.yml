name: backend-ci

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'db/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'db/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run --workspace okra-backend lint

      - name: Test backend
        run: npm run --workspace okra-backend test

      - name: Run stage migrations
        if: github.ref == 'refs/heads/master'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGE }}
        run: npm run --workspace okra-backend db:migrate
