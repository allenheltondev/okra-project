name: frontend-ci

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run --workspace okra-frontend lint

      - name: Test frontend
        run: npm run --workspace okra-frontend test

      - name: Typecheck frontend
        run: npm run --workspace okra-frontend typecheck

      - name: Build frontend
        run: npm run --workspace okra-frontend build
