name: infra-deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/template.yaml'
      - 'backend/samconfig.template.toml'
      - 'backend/src/**'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache SAM build artifacts
        uses: actions/cache@v4
        with:
          path: backend/.aws-sam/cache
          key: ${{ runner.os }}-sam-${{ hashFiles('backend/template.yaml', 'backend/src/**', 'backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sam-

      - name: Install dependencies
        run: npm ci

      - name: Install esbuild globally for SAM
        run: npm install -g esbuild

      - name: Render samconfig from template
        working-directory: backend
        env:
          DSQL_HOSTNAME_STAGE: ${{ secrets.DSQL_HOSTNAME_STAGE }}
          DSQL_HOSTNAME_PROD: ${{ secrets.DSQL_HOSTNAME_PROD }}
        run: |
          export STACK_NAME_STAGE="okra-project-stage"
          sed "s|__DSQL_HOSTNAME_STAGE__|${DSQL_HOSTNAME_STAGE}|g; s|__DSQL_HOSTNAME_PROD__|${DSQL_HOSTNAME_PROD}|g; s|__STACK_NAME_STAGE__|${STACK_NAME_STAGE}|g" samconfig.template.toml > samconfig.generated.toml

      - name: Deploy SAM stack (prod)
        working-directory: backend
        run: |
          sam build --template-file template.yaml --cached --parallel
          sam deploy --config-file samconfig.generated.toml --config-env prod --no-fail-on-empty-changeset

      - name: Resolve API base URL
        id: api
        run: |
          API_ROOT=$(aws cloudformation describe-stacks \
            --stack-name okra-project-prod \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)
          API_BASE_URL="${API_ROOT%/}/api"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Run integration tests against deployed backend
        env:
          API_BASE_URL: ${{ steps.api.outputs.api_base_url }}
        run: npm run test:integration

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name okra-project-prod \
            --query "Stacks[0].Outputs[*].[OutputKey,OutputValue]" \
            --output table
