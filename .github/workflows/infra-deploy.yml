name: infra-deploy

on:
  push:
    branches:
      - master
    paths:
      - 'backend/template.yaml'
      - 'backend/samconfig.toml'
      - 'backend/src/**'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENV_NAME: dev
  AWS_REGION: us-east-1
  STACK_NAME: okra-project-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache SAM build artifacts
        uses: actions/cache@v4
        with:
          path: backend/.aws-sam/cache
          key: ${{ runner.os }}-sam-${{ hashFiles('backend/template.yaml', 'backend/src/**', 'backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sam-

      - name: Install dependencies
        run: npm ci

      - name: Deploy SAM stack (env: dev)
        working-directory: backend
        run: |
          sam build --template-file template.yaml --cached --parallel
          sam deploy --config-env $ENV_NAME --no-fail-on-empty-changeset

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[*].[OutputKey,OutputValue]" \
            --output table
