name: preview-staging

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/preview-staging.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      api_base_url: ${{ steps.api.outputs.api_base_url }}
      admin_api_base_url: ${{ steps.admin-api.outputs.admin_api_base_url }}
      ci_auth_function_name: ${{ steps.ci-auth-fn.outputs.ci_auth_function_name }}
    env:
      STACK_NAME: okra-project-preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache SAM build artifacts
        uses: actions/cache@v4
        with:
          path: backend/.aws-sam/cache
          key: ${{ runner.os }}-sam-preview-${{ hashFiles('backend/template.yaml', 'backend/src/**', 'backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sam-preview-

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run --workspace okra-backend lint

      - name: Test backend
        run: npm run --workspace okra-backend test

      - name: Run staging migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: npm run --workspace okra-backend db:migrate

      - name: Install esbuild globally for SAM
        run: npm install -g esbuild

      - name: Render samconfig from template
        working-directory: backend
        env:
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
          CI_ADMIN_USERNAME: ${{ secrets.CI_ADMIN_USERNAME }}
          CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          SHARED_USER_POOL_ID: ${{ secrets.SHARED_USER_POOL_ID_STAGING }}
          SHARED_USER_POOL_CLIENT_ID: ${{ secrets.SHARED_USER_POOL_CLIENT_ID_STAGING }}
        run: |
          ESCAPED_DATABASE_URL=$(printf '%s' "$DATABASE_URL_STAGING" | sed 's/[&|]/\\&/g')
          ESCAPED_CI_USERNAME=$(printf '%s' "$CI_ADMIN_USERNAME" | sed 's/[&|]/\\&/g')
          ESCAPED_CI_PASSWORD=$(printf '%s' "$CI_ADMIN_PASSWORD" | sed 's/[&|]/\\&/g')
          export STACK_NAME_PREVIEW="$STACK_NAME"
          sed "s|__DATABASE_URL__|${ESCAPED_DATABASE_URL}|g; s|__STACK_NAME_PREVIEW__|${STACK_NAME_PREVIEW}|g; s|__SHARED_USER_POOL_ID__|${SHARED_USER_POOL_ID}|g; s|__SHARED_USER_POOL_CLIENT_ID__|${SHARED_USER_POOL_CLIENT_ID}|g; s|__CI_ADMIN_USERNAME__|${ESCAPED_CI_USERNAME}|g; s|__CI_ADMIN_PASSWORD__|${ESCAPED_CI_PASSWORD}|g" samconfig.template.toml > samconfig.generated.toml

      - name: Recover preview stack if stuck in ROLLBACK_COMPLETE
        shell: bash
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || true)

          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Preview stack is ROLLBACK_COMPLETE. Deleting before fresh deploy..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
          fi

      - name: Build and deploy preview infra
        working-directory: backend
        run: |
          npm_config_platform=linux npm_config_arch=arm64 sam build --template-file template.yaml --cached --parallel
          sam deploy --config-file samconfig.generated.toml --config-env preview --no-fail-on-empty-changeset

      - name: Resolve preview API base URL
        id: api
        run: |
          API_ROOT=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)
          API_BASE_URL="${API_ROOT%/}/api"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve preview Admin API base URL
        id: admin-api
        run: |
          ADMIN_ROOT=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AdminApiUrl'].OutputValue" \
            --output text)
          ADMIN_API_BASE_URL="${ADMIN_ROOT%/}/admin"
          echo "admin_api_base_url=$ADMIN_API_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve CI auth function name
        id: ci-auth-fn
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CiAuthTokenFunctionName'].OutputValue" \
            --output text)
          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" = "None" ] || [ "$FUNCTION_NAME" = "NONE" ]; then
            echo "CiAuthTokenFunctionName stack output is required for integration test auth."
            exit 1
          fi
          echo "ci_auth_function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: npm run --workspace okra-frontend build

      - name: Resolve preview outputs
        id: stack
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          DISTRIBUTION_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionDomainName'].OutputValue" \
            --output text)

          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$DISTRIBUTION_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Upload frontend assets
        run: aws s3 sync frontend/dist "s3://${{ steps.stack.outputs.frontend_bucket }}" --delete

      - name: Invalidate preview cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.stack.outputs.distribution_id }}" --paths "/*"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ steps.stack.outputs.distribution_domain }}`;
            const body = `🧪 Preview environment is ready for this PR:\n\n${url}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  integration-tests:
    if: github.event.action != 'closed'
    needs: deploy-preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Configure AWS credentials (stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CI admin token from Lambda
        id: ci-auth
        run: |
          aws lambda invoke \
            --function-name "${{ needs.deploy-preview.outputs.ci_auth_function_name }}" \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            ci-auth-response.json > /dev/null
          ADMIN_TOKEN=$(jq -r '.accessToken' ci-auth-response.json)
          if [ -z "$ADMIN_TOKEN" ] || [ "$ADMIN_TOKEN" = "null" ]; then
            echo "Failed to extract accessToken from CI auth Lambda response."
            cat ci-auth-response.json
            exit 1
          fi
          echo "::add-mask::$ADMIN_TOKEN"
          echo "admin_token=$ADMIN_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          API_BASE_URL: ${{ needs.deploy-preview.outputs.api_base_url }}
          ADMIN_API_BASE_URL: ${{ needs.deploy-preview.outputs.admin_api_base_url }}
          ADMIN_TOKEN: ${{ steps.ci-auth.outputs.admin_token }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: npm run test:integration

  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      STACK_NAME: okra-project-preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Configure AWS credentials (stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve preview buckets (if stack exists)
        id: buckets
        shell: bash
        run: |
          set +e
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text 2>/dev/null)
          MEDIA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text 2>/dev/null)
          set -e

          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "media_bucket=$MEDIA_BUCKET" >> "$GITHUB_OUTPUT"

      - name: Empty preview frontend bucket
        if: steps.buckets.outputs.frontend_bucket != ''
        run: aws s3 rm "s3://${{ steps.buckets.outputs.frontend_bucket }}" --recursive || true

      - name: Empty preview media bucket
        if: steps.buckets.outputs.media_bucket != ''
        run: aws s3 rm "s3://${{ steps.buckets.outputs.media_bucket }}" --recursive || true

      - name: Delete preview stack
        run: |
          aws cloudformation delete-stack --stack-name "$STACK_NAME" || true

      - name: Wait for stack deletion
        run: |
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" || true
