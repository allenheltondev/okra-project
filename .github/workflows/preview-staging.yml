name: preview-staging

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/preview-staging.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      STACK_NAME: okra-project-preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache SAM build artifacts
        uses: actions/cache@v4
        with:
          path: backend/.aws-sam/cache
          key: ${{ runner.os }}-sam-preview-${{ hashFiles('backend/template.yaml', 'backend/src/**', 'backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sam-preview-

      - name: Install dependencies
        run: npm ci

      - name: Install esbuild globally for SAM
        run: npm install -g esbuild

      - name: Render samconfig from template
        working-directory: backend
        env:
          DSQL_HOSTNAME_BASE: ${{ secrets.DSQL_HOSTNAME_BASE }}
        run: |
          export DSQL_HOSTNAME_STAGE="${DSQL_HOSTNAME_BASE}-stage"
          export DSQL_HOSTNAME_PROD="${DSQL_HOSTNAME_BASE}-prod"
          export STACK_NAME_STAGE="$STACK_NAME"
          sed "s|__DSQL_HOSTNAME_STAGE__|${DSQL_HOSTNAME_STAGE}|g; s|__DSQL_HOSTNAME_PROD__|${DSQL_HOSTNAME_PROD}|g; s|__STACK_NAME_STAGE__|${STACK_NAME_STAGE}|g" samconfig.template.toml > samconfig.generated.toml

      - name: Build and deploy preview infra
        working-directory: backend
        run: |
          sam build --template-file template.yaml --cached --parallel
          sam deploy --config-file samconfig.generated.toml --config-env stage

      - name: Resolve preview API base URL
        id: api
        run: |
          API_ROOT=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)
          API_BASE_URL="${API_ROOT%/}/api"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Run integration tests against preview backend
        env:
          API_BASE_URL: ${{ steps.api.outputs.api_base_url }}
        run: npm run test:integration

      - name: Build frontend
        run: npm run --workspace okra-frontend build

      - name: Resolve preview outputs
        id: stack
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          DISTRIBUTION_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionDomainName'].OutputValue" \
            --output text)

          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$DISTRIBUTION_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Upload frontend assets
        run: aws s3 sync frontend/dist "s3://${{ steps.stack.outputs.frontend_bucket }}" --delete

      - name: Invalidate preview cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.stack.outputs.distribution_id }}" --paths "/*"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ steps.stack.outputs.distribution_domain }}`;
            const body = `🧪 Preview environment is ready for this PR:\n\n${url}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      STACK_NAME: okra-project-preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Configure AWS credentials (stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve preview buckets (if stack exists)
        id: buckets
        shell: bash
        run: |
          set +e
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text 2>/dev/null)
          MEDIA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text 2>/dev/null)
          set -e

          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "media_bucket=$MEDIA_BUCKET" >> "$GITHUB_OUTPUT"

      - name: Empty preview buckets (including versioned objects)
        shell: bash
        env:
          FRONTEND_BUCKET: ${{ steps.buckets.outputs.frontend_bucket }}
          MEDIA_BUCKET: ${{ steps.buckets.outputs.media_bucket }}
        run: |
          set -euo pipefail

          purge_bucket() {
            local bucket="$1"
            if [ -z "$bucket" ] || [ "$bucket" = "None" ]; then
              return 0
            fi

            echo "Purging bucket: $bucket"
            aws s3 rm "s3://$bucket" --recursive || true

            while true; do
              PAYLOAD=$(aws s3api list-object-versions --bucket "$bucket" --output json)

              DELETE_JSON=$(PAYLOAD_JSON="$PAYLOAD" python -c "import json,os; p=json.loads(os.environ.get('PAYLOAD_JSON','{}')); objs=[{'Key':v['Key'],'VersionId':v['VersionId']} for v in (p.get('Versions') or [])] + [{'Key':m['Key'],'VersionId':m['VersionId']} for m in (p.get('DeleteMarkers') or [])]; print(json.dumps({'Objects': objs, 'Quiet': True}))")

              COUNT=$(DELETE_JSON="$DELETE_JSON" python -c "import json,os; d=json.loads(os.environ.get('DELETE_JSON','{}')); print(len(d.get('Objects', [])))")

              if [ "$COUNT" -eq 0 ]; then
                break
              fi

              aws s3api delete-objects --bucket "$bucket" --delete "$DELETE_JSON" >/dev/null
            done
          }

          purge_bucket "$FRONTEND_BUCKET"
          purge_bucket "$MEDIA_BUCKET"

      - name: Delete preview stack
        run: |
          aws cloudformation delete-stack --stack-name "$STACK_NAME" || true

      - name: Wait for stack deletion
        run: |
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" || true
